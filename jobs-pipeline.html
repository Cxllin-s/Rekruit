<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Rekruit — Pipeline</title>
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>
  <div class="topbar">
    <div class="nav">
      <div class="brand"><span class="dot"></span> Rekruit</div>
      <div class="navlinks">
        <a class="chip" data-nav href="dashboard.html">Dashboard</a>
        <a class="chip" data-nav href="companies.html">Companies</a>
        <a class="chip" data-nav href="candidates.html">Candidates</a>
        <a class="chip" data-nav href="applications.html">Applications</a>
        <a class="chip" data-nav href="jobs-pipeline.html">Pipeline</a>
        <a class="chip" data-nav href="users.html">Users</a>
        <a class="chip" data-nav href="reports.html">Reports</a>
        <a class="chip" data-nav href="settings.html">Settings</a>
        <a class="chip" href="#" data-logout>Logout</a>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="section-title">
      <div>
        <h2>Recruitment Pipeline</h2>
        <p>Drag candidates between stages to update their journey.</p>
      </div>
      <a href="candidates.html" class="btn primary">Manage Candidates</a>
    </div>

    <div class="kanban kanban-7">
      <div class="col" data-col data-stage="Applied"><div class="colhead"><h3>Applied</h3><div class="count" data-count>0</div></div><div class="dropzone" data-zone></div></div>
      <div class="col" data-col data-stage="Screened"><div class="colhead"><h3>Screened</h3><div class="count" data-count>0</div></div><div class="dropzone" data-zone></div></div>
      <div class="col" data-col data-stage="Interview 1"><div class="colhead"><h3>Interview 1</h3><div class="count" data-count>0</div></div><div class="dropzone" data-zone></div></div>
      <div class="col" data-col data-stage="Interview 2"><div class="colhead"><h3>Interview 2</h3><div class="count" data-count>0</div></div><div class="dropzone" data-zone></div></div>
      <div class="col" data-col data-stage="Offer"><div class="colhead"><h3>Offer</h3><div class="count" data-count>0</div></div><div class="dropzone" data-zone></div></div>
      <div class="col" data-col data-stage="Placed"><div class="colhead"><h3>Placed</h3><div class="count" data-count>0</div></div><div class="dropzone" data-zone></div></div>
      <div class="col" data-col data-stage="Rejected"><div class="colhead"><h3>Rejected</h3><div class="count" data-count>0</div></div><div class="dropzone" data-zone></div></div>
    </div>
  </div>

  <script defer src="js/app.js"></script>
</body>
</html>
