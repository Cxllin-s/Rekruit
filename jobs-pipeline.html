<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Rekruit — Jobs Pipeline</title>
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>
  <div class="topbar">
    <div class="nav">
      <div class="brand"><span class="dot"></span> Rekruit</div>
      <div class="navlinks">
        <a class="chip" data-nav href="dashboard.html">Dashboard</a>
        <a class="chip" data-nav href="candidates.html">Candidates</a>
        <a class="chip" data-nav href="jobs-pipeline.html">Jobs Pipeline</a>
        <a class="chip" data-nav href="login.html">Logout</a>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="section-title">
      <div>
        <h2>Candidate Pipeline</h2>
        <p>Drag candidates between stages. Changes are saved locally for demo.</p>
      </div>
      <a href="candidates.html" class="btn primary">+ Add Candidate</a>
    </div>

    <div class="kanban">
      <div class="col" data-col data-stage="Applied"><div class="colhead"><h3>Applied</h3><div class="count" data-count>0</div></div><div class="dropzone" data-zone></div></div>
      <div class="col" data-col data-stage="Screened"><div class="colhead"><h3>Screened</h3><div class="count" data-count>0</div></div><div class="dropzone" data-zone></div></div>
      <div class="col" data-col data-stage="Interview"><div class="colhead"><h3>Interview</h3><div class="count" data-count>0</div></div><div class="dropzone" data-zone></div></div>
      <div class="col" data-col data-stage="Offer"><div class="colhead"><h3>Offer</h3><div class="count" data-count>0</div></div><div class="dropzone" data-zone></div></div>
      <div class="col" data-col data-stage="Placed"><div class="colhead"><h3>Placed</h3><div class="count" data-count>0</div></div><div class="dropzone" data-zone></div></div>
      <div class="col" data-col data-stage="Rejected"><div class="colhead"><h3>Rejected</h3><div class="count" data-count>0</div></div><div class="dropzone" data-zone></div></div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
