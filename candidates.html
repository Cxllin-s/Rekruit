<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Rekruit — Candidates</title>
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>
  <div class="topbar">
    <div class="nav">
      <div class="brand"><span class="dot"></span> Rekruit</div>
      <div class="navlinks">
        <a class="chip" data-nav href="dashboard.html">Dashboard</a>
        <a class="chip" data-nav href="companies.html">Companies</a>
        <a class="chip" data-nav href="candidates.html">Candidates</a>
        <a class="chip" data-nav href="applications.html">Applications</a>
        <a class="chip" data-nav href="jobs-pipeline.html">Pipeline</a>
        <a class="chip" data-nav href="users.html">Users</a>
        <a class="chip" data-nav href="reports.html">Reports</a>
        <a class="chip" data-nav href="settings.html">Settings</a>
        <a class="chip" href="#" data-logout>Logout</a>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="section-title">
      <div>
        <h2>Candidate Database</h2>
        <p>Create and maintain your real candidate records.</p>
      </div>
      <input class="input" style="max-width:360px" data-candidate-search placeholder="Search candidates..." />
    </div>

    <form class="card form" data-candidate-form>
      <div class="grid grid-3">
        <div class="field"><label>Full name</label><input class="input" required name="name" /></div>
        <div class="field"><label>Email</label><input class="input" required name="email" type="email" /></div>
        <div class="field"><label>Phone</label><input class="input" name="phone" /></div>
      </div>
      <div class="grid grid-3">
        <div class="field"><label>Location</label><input class="input" required name="location" /></div>
        <div class="field"><label>Stage</label><select class="input" name="stage"><option>Applied</option><option>Screened</option><option>Interview</option><option>Offer</option><option>Placed</option><option>Rejected</option></select></div>
        <div class="field"><label>Job assignment</label><select class="input" data-candidate-job name="jobId"></select></div>
      </div>
      <div class="grid grid-2">
        <div class="field"><label>Skills</label><input class="input" name="skills" /></div>
        <div class="field"><label>Notes</label><input class="input" name="notes" /></div>
      </div>
      <div class="actions"><button class="btn primary" type="submit">Add Candidate</button></div>
    </form>

    <table class="table" style="margin-top:16px">
      <thead><tr><th>Name</th><th>Email</th><th>Phone</th><th>Location</th><th>Stage</th><th>Job</th><th>Skills</th><th></th></tr></thead>
      <tbody data-candidates-body></tbody>
    </table>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
