<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Rekruit — Candidates</title>
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>
  <div class="topbar">
    <div class="nav">
      <div class="brand"><span class="dot"></span> Rekruit</div>
      <div class="navlinks">
        <a class="chip" data-nav href="dashboard.html">Dashboard</a>
        <a class="chip" data-nav href="candidates.html">Candidates</a>
        <a class="chip" data-nav href="jobs-pipeline.html">Jobs Pipeline</a>
        <a class="chip" data-nav href="login.html">Logout</a>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="section-title">
      <div>
        <h2>Candidate Database</h2>
        <p>Add, update stage, and remove candidates.</p>
      </div>
    </div>

    <form class="card form" data-candidate-form>
      <div class="grid grid-3">
        <div class="field">
          <label>Full name</label>
          <input class="input" required name="name" placeholder="Nthabiseng Mokoena" />
        </div>
        <div class="field">
          <label>Email</label>
          <input class="input" required name="email" type="email" placeholder="candidate@email.com" />
        </div>
        <div class="field">
          <label>Location</label>
          <input class="input" required name="location" placeholder="Cape Town" />
        </div>
      </div>
      <div class="grid grid-2">
        <div class="field">
          <label>Stage</label>
          <select class="input" name="stage">
            <option>Applied</option>
            <option>Screened</option>
            <option>Interview</option>
            <option>Offer</option>
            <option>Placed</option>
            <option>Rejected</option>
          </select>
        </div>
        <div class="field">
          <label>Skills</label>
          <input class="input" name="skills" placeholder="Excel, IFRS, Payroll" />
        </div>
      </div>
      <div class="actions">
        <button class="btn primary" type="submit">Add Candidate</button>
      </div>
    </form>

    <table class="table" style="margin-top:16px">
      <thead>
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Location</th>
          <th>Stage</th>
          <th>Skills</th>
          <th></th>
        </tr>
      </thead>
      <tbody data-candidates-body></tbody>
    </table>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
