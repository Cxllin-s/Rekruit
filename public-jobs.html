<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Rekruit — Live Jobs</title>
  <link rel="stylesheet" href="css/app.css" />
</head>

<body>
  <div class="container">
    <div class="section-title">
      <div>
        <h2>Live Job Board</h2>
        <p>Public vacancies powered by Rekruit.</p>
      </div>
      <div class="row" style="gap:10px; flex-wrap:wrap; justify-content:flex-end;">
        <a class="btn" href="login.html">Recruiter Login</a>
        <a class="btn" href="dashboard.html">Dashboard</a>
      </div>
    </div>

    <table class="table">
      <thead>
        <tr>
          <th>Job</th>
          <th>Company</th>
          <th>Location</th>
          <th>Type</th>
          <th>Salary</th>
          <th></th>
        </tr>
      </thead>
      <tbody data-public-jobs-body></tbody>
    </table>

    <small class="footer-note">
      Only jobs marked <b>Active</b> appear here.
    </small>
  </div>

  <script defer src="js/app.js"></script>
</body>
</html>
