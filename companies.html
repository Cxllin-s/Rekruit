<div class="container"><div class="section-title"><div><h2>Company & Client CRM</h2><p>Manage clients, contacts, and billing references.</p></div></div>
<form class="card form" data-company-form><div class="grid grid-3"><div class="field"><label>Company name</label><input class="input" name="name" required/></div><div class="field"><label>Industry</label><input class="input" name="industry" required/></div><div class="field"><label>Location (SA Province/City)</label><input class="input" name="location" required/></div></div><div class="grid grid-3"><div class="field"><label>Contact person</label><input class="input" name="contact"/></div><div class="field"><label>Billing details</label><input class="input" name="billing"/></div><div class="field"><label>Deal status</label><select class="input" name="status"><option>Active</option><option>Paused</option><option>Closed</option></select></div></div><div class="field"><label>Notes</label><input class="input" name="notes"/></div><div class="actions"><button class="btn primary" type="submit">Save Company</button></div></form>
<table class="table" style="margin-top:16px"><thead><tr><th>Company</th><th>Industry</th><th>Location</th><th>Contact</th><th>Status</th><th></th></tr></thead><tbody data-companies-body></tbody></table>
