<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Rekruit — Apply</title>
  <link rel="stylesheet" href="css/app.css"/>
</head>
<body>
  <div class="container">
    <div class="section-title">
      <div>
        <h2>Apply for Job</h2>
        <p>Submit your profile directly to the ATS.</p>
      </div>
      <a class="btn" href="public-jobs.html">Back to Jobs</a>
    </div>

    <div class="card form" data-apply-job style="margin-bottom:14px;"></div>

    <form class="card form" data-public-apply-form>
      <div class="grid grid-2">
        <div class="field"><label>Full name</label><input class="input" name="name" required/></div>
        <div class="field"><label>Email</label><input class="input" name="email" type="email" required/></div>
        <div class="field"><label>Phone</label><input class="input" name="phone"/></div>
        <div class="field"><label>Location</label><input class="input" name="location" required/></div>
      </div>
      <div class="field"><label>Skills</label><input class="input" name="skills"/></div>
      <div class="field"><label>CV / Profile link</label><input class="input" name="cvLink" placeholder="https://..."/></div>
      <div class="actions"><button class="btn primary" type="submit">Submit Application</button></div>
    </form>
  </div>
  <script defer src="js/app.js"></script>
</body>
</html>
