<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Rekruit — Login</title>
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>
  <div class="center">
    <div class="split">
      <div class="card hero">
        <div class="brand"><span class="dot"></span> Rekruit</div>
        <h2 style="margin-top:14px;">A complete recruiting workspace.</h2>
        <p>Track jobs, manage candidate data, move pipelines, and keep recruiter notes in one system.</p>
      </div>

      <form class="card form" data-login-form>
        <h1>Sign in</h1>
        <p>Use your recruiter account to continue.</p>

        <div class="field">
          <label>Email</label>
          <input class="input" required name="email" type="email" placeholder="name@company.co.za" />
        </div>

        <div class="field">
          <label>Password</label>
          <input class="input" required name="password" type="password" placeholder="••••••••" />
        </div>

        <div class="actions">
          <button class="btn primary" type="submit">Login</button>
          <a class="btn" href="signup.html">Create account</a>
        </div>
      </form>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
