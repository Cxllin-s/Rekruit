<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Rekruit — Sign Up</title>
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>
  <div class="center">
    <div class="split">
      <div class="card hero">
        <div class="brand"><span class="dot"></span> Rekruit</div>
        <h2 style="margin-top:14px;">Create your recruiter workspace account.</h2>
        <p>Set up your organization and start managing companies, jobs, applications, and placements.</p>
      </div>

      <form class="card form" data-signup-form>
        <h1>Create account</h1>
        <p>Sign up to access the ATS dashboard.</p>

        <div class="field">
          <label>Full Name</label>
          <input class="input" required name="name" type="text" placeholder="Your name" />
        </div>

        <div class="field">
          <label>Email</label>
          <input class="input" required name="email" type="email" placeholder="name@company.co.za" />
        </div>

        <div class="field">
          <label>Role</label>
          <select class="input" name="role">
            <option>Super Admin</option>
            <option>Company Admin</option>
            <option>Recruiter</option>
            <option>Hiring Manager</option>
            <option>Finance / HR</option>
          </select>
        </div>

        <div class="field">
          <label>Password</label>
          <input class="input" required name="password" type="password" placeholder="At least 6 characters" />
        </div>

        <div class="field">
          <label>Confirm Password</label>
          <input class="input" required name="confirmPassword" type="password" placeholder="Repeat password" />
        </div>

        <div class="actions">
          <button class="btn primary" type="submit">Sign Up</button>
          <a class="btn" href="login.html">Back to Login</a>
        </div>
      </form>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
